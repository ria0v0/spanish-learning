<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸡mmy Choo泰式古法</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 8px;
            text-align: center;
            background: linear-gradient(90deg, #f5af19, #f12711);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1em;
            color: #ccc;
            margin-bottom: 30px;
        }

        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin-bottom: 30px;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            box-shadow: 0 0 30px rgba(245, 175, 25, 0.3), 0 0 60px rgba(241, 39, 17, 0.1);
        }

        .wheel canvas {
            width: 100%;
            height: 100%;
        }

        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #f5af19;
            z-index: 10;
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3));
        }

        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #f5af19, #f12711);
            border-radius: 50%;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
        }

        .spin-btn {
            padding: 16px 50px;
            font-size: 1.2em;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #f5af19, #f12711);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 5px 20px rgba(241, 39, 17, 0.3);
        }

        .spin-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(241, 39, 17, 0.5);
        }

        .spin-btn:active {
            transform: translateY(0);
        }

        .spin-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result-display {
            margin-top: 25px;
            font-size: 1.4em;
            min-height: 40px;
            text-align: center;
        }

        .result-display .name {
            color: #f5af19;
            font-weight: bold;
            font-size: 1.3em;
        }

        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .celebrate {
            animation: celebrate 0.5s ease 3;
        }

        .decorative {
            position: fixed;
            font-size: 2em;
            opacity: 0.1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="decorative" style="top:10%;left:5%;">🐔</div>
    <div class="decorative" style="top:20%;right:8%;">👠</div>
    <div class="decorative" style="bottom:15%;left:10%;">🧖‍♀️</div>
    <div class="decorative" style="bottom:10%;right:5%;">🐔</div>

    <h1>🐔 鸡mmy Choo泰式古法 👠</h1>
    <p class="subtitle">请选择你今天的技师</p>

    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="wheel" id="wheel">
            <canvas id="wheelCanvas" width="640" height="640"></canvas>
        </div>
        <div class="center-circle">🙌</div>
    </div>

    <button class="spin-btn" id="spinBtn" onclick="spin()">开始转盘 🎰</button>

    <div class="result-display" id="result"></div>

    <script>
        const segments = ['Haley', 'Gwen', 'Ria', 'Ruijia', 'CC', 'Tirano', 'Ming', '再转一次'];
        const colors = [
            '#FF6B6B', '#FFA502', '#FFD93D', '#6BCB77',
            '#4D96FF', '#9B59B6', '#FF85A1', '#45B7D1'
        ];

        let currentRotation = 0;
        let isSpinning = false;

        // Draw wheel
        function drawWheel() {
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2 - 10;
            const segmentAngle = (2 * Math.PI) / segments.length;

            segments.forEach((name, i) => {
                const startAngle = i * segmentAngle;
                const endAngle = startAngle + segmentAngle;

                // Draw segment
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = colors[i];
                ctx.fill();

                // Draw border
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Draw text
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + segmentAngle / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = 'white';
                ctx.font = 'bold 28px sans-serif';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 4;
                ctx.fillText(name, radius - 25, 8);
                ctx.restore();
            });

            // Outer ring
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = 'rgba(245, 175, 25, 0.6)';
            ctx.lineWidth = 6;
            ctx.stroke();
        }

        drawWheel();

        function spin() {
            if (isSpinning) return;
            isSpinning = true;

            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            document.getElementById('result').innerHTML = '';

            // Random rotation: at least 5 full spins + random position
            const extraDegrees = Math.random() * 360;
            const totalRotation = currentRotation + 1800 + extraDegrees;

            const wheel = document.getElementById('wheel');
            wheel.style.transition = 'transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
            wheel.style.transform = `rotate(${totalRotation}deg)`;

            currentRotation = totalRotation;

            setTimeout(() => {
                // Calculate which segment the pointer is on
                // Pointer is at top (270 degrees in standard math)
                const normalizedDeg = totalRotation % 360;
                const segmentAngle = 360 / segments.length;
                // The wheel rotates clockwise, pointer is at top
                // Segment 0 starts at the right (0 deg), so we need to offset
                const pointerAngle = (360 - normalizedDeg + 270) % 360;
                const index = Math.floor(pointerAngle / segmentAngle) % segments.length;
                const selected = segments[index];

                const resultDiv = document.getElementById('result');

                if (selected === '再转一次') {
                    resultDiv.innerHTML = '🔄 手气不错，再来一次！';
                    isSpinning = false;
                    btn.disabled = false;
                } else {
                    resultDiv.innerHTML = `今天为您服务的技师是：<span class="name">${selected}</span> ✨`;
                    resultDiv.classList.add('celebrate');
                    setTimeout(() => {
                        resultDiv.classList.remove('celebrate');
                        isSpinning = false;
                        btn.disabled = false;
                    }, 1500);
                }
            }, 4200);
        }
    </script>
</body>
</html>
