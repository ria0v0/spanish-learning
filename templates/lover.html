<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你的命定恋人生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ff9a9e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 35px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        h1 {
            text-align: center;
            font-size: 1.6em;
            margin-bottom: 6px;
            color: #e74c3c;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.85em;
            margin-bottom: 25px;
        }

        .gender-select {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .gender-btn {
            padding: 12px 30px;
            border: 2px solid #eee;
            border-radius: 25px;
            background: white;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .gender-btn:hover { border-color: #e74c3c; }
        .gender-btn.active {
            border-color: #e74c3c;
            background: #fff5f5;
            color: #e74c3c;
            font-weight: bold;
        }

        .generate-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.4);
        }

        .result-card {
            margin-top: 25px;
            padding: 25px;
            background: linear-gradient(135deg, #fff9f9, #fff0f0);
            border-radius: 16px;
            border: 1px solid #fde;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lover-header {
            text-align: center;
            margin-bottom: 15px;
        }

        .lover-name {
            font-size: 1.4em;
            font-weight: bold;
            color: #c0392b;
            margin-bottom: 4px;
        }

        .lover-title {
            font-size: 0.8em;
            color: #e74c3c;
            opacity: 0.8;
        }

        .attr-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }

        .attr-item {
            background: white;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #fee;
        }

        .attr-label {
            font-size: 0.7em;
            color: #999;
            margin-bottom: 3px;
        }

        .attr-value {
            font-size: 0.9em;
            color: #333;
            font-weight: 500;
        }

        .lover-desc {
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 10px;
            border: 1px solid #fee;
            font-size: 0.88em;
            color: #555;
            line-height: 1.7;
            font-style: italic;
        }

        .lover-desc::before {
            content: '「';
            color: #e74c3c;
            font-weight: bold;
        }

        .lover-desc::after {
            content: '」';
            color: #e74c3c;
            font-weight: bold;
        }

        .share-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .share-row button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 0.85em;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .share-row button:hover { opacity: 0.8; }
        .btn-again { background: #e74c3c; color: white; }
        .btn-share { background: #00b894; color: white; }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💘 你的命定恋人生成器</h1>
        <p class="subtitle">据说每个人冥冥之中都有一个命定之人... 来看看Ta是谁</p>

        <div class="gender-select">
            <button class="gender-btn active" onclick="selectGender('male', this)">👨 男友</button>
            <button class="gender-btn" onclick="selectGender('female', this)">👩 女友</button>
            <button class="gender-btn" onclick="selectGender('random', this)">🎲 随缘</button>
        </div>

        <button class="generate-btn" onclick="generate()">✨ 生成我的命定恋人</button>

        <div id="result" class="hidden"></div>
    </div>

    <script>
        let selectedGender = 'male';

        function selectGender(gender, btn) {
            selectedGender = gender;
            document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        const maleNames = ['顾承泽', '沈夜辰', '陆景深', '萧逸尘', '裴衍之', '霍凌霄', '慕容玦', '叶修远', '江辞寒', '楚南絮', '席慕白', '傅寒川', '龙墨渊', '战北辰', '厉承渊'];
        const femaleNames = ['苏晚棠', '沈清落', '顾念卿', '柳如烟', '温婉凝', '林黛秋', '云熙然', '慕灵珊', '夏锦年', '叶芷萱', '颜若雪', '沐瑶光', '楚晴岚', '凤倾城', '南宫婉'];

        const maleTitles = [
            '帝都第一继承人', '暗夜集团掌权者', '商界传奇少年CEO',
            '军区特种兵王', '隐世古武传人', '顶级黑客代号Zero',
            '国际钢琴大师', 'F1赛车手兼模特', '暗界执法者',
            '皇族末裔·复仇者', '三大家族联合继承人', '前特工现霸总'
        ];
        const femaleTitles = [
            '财阀千金·隐藏身份', '天才少女画家', '暗夜蔷薇组织首领',
            '星际医学天才', '古武世家唯一传人', '顶级调香师',
            '双面间谍·代号凤凰', '百亿帝国继承人', '灵魂乐手',
            '皇族流落民间的公主', '国际超模兼博士', '暗界第一杀手已退休'
        ];

        const families = [
            '世界500强家族企业继承人，家中有7栋别墅和一座私人岛屿',
            '三代军人世家，外公是开国将领',
            '父亲经营地下帝国，母亲是前超模',
            '欧洲贵族后裔，家族城堡有300年历史',
            '硅谷科技新贵，父母身价百亿美金',
            '中东石油家族旁支，零花钱按亿计算',
            '隐世财阀，低调到福布斯都查不到',
            '父母双亡，但发现了爷爷留下的万亿遗产',
            '表面孤儿，实际是皇室血脉等待认祖归宗',
            '家族垄断全球稀有矿产，闷声发大财'
        ];

        const heights_male = ['178cm 黄金比例', '183cm 超模身材', '188cm 行走的衣架', '192cm 压迫感十足', '185cm 完美身高', '180cm 刚刚好'];
        const heights_female = ['165cm 甜美挂', '168cm 气质高挑', '172cm 超模比例', '160cm 小巧可爱', '175cm 御姐身高', '170cm 黄金比例'];

        const looks_male = [
            '剑眉星目，冷峻如雕塑，笑起来却像阳光刺穿乌云',
            '混血感五官，琥珀色瞳孔，下颚线能割伤人心',
            '清冷禁欲系，薄唇微抿时让人窒息',
            '邪魅狂狷，桃花眼一勾能摄人心魄',
            '温润如玉，眉眼含笑像三月春风',
            '病弱美人型，苍白肌肤配黑发，楚楚动人',
            '野性荷尔蒙爆棚，胸肌腹肌八块清晰可见'
        ];
        const looks_female = [
            '巴掌大的小脸，锁骨能放硬币，眼睛会说话',
            '冷白皮天花板，不化妆能让人一眼万年',
            '娃娃脸配御姐身材，反差感致命',
            '素颜淡漠如莲花，一笑倾城',
            '混血浓颜大美人，走到哪里都是焦点',
            '清冷疏离感，像高山上的雪莲',
            '性感妩媚却不自知，无意间的撩拨最致命'
        ];

        const personalities = [
            '表面高冷禁欲，实际只对你一人撒娇黏人',
            '毒舌傲娇，嘴上说着讨厌你身体却很诚实',
            '温柔到骨子里，但触碰到底线时气场两米八',
            '话很少但都是行动派，默默为你挡掉所有风雨',
            '表面花心实则专一至极，眼里只有你',
            '偏执疯批型，爱你爱到世界毁灭也不在乎',
            '天才型人格，智商200但只在你面前变笨',
            '闷骚内敛，白天是总裁晚上变奶狗/奶猫',
            '霸道独占欲强，别人多看你一眼都要生气',
            '治愈系暖宝宝，和Ta在一起世界都变温柔了'
        ];

        const zodiacs = ['白羊座 ♈ 热情如火', '金牛座 ♉ 深沉专一', '双子座 ♊ 灵魂有趣', '巨蟹座 ♋ 温柔顾家', '狮子座 ♌ 王者风范', '处女座 ♍ 完美主义', '天秤座 ♎ 颜值担当', '天蝎座 ♏ 致命诱惑', '射手座 ♐ 自由灵魂', '摩羯座 ♑ 可靠如山', '水瓶座 ♒ 独特迷人', '双鱼座 ♓ 浪漫至死'];

        const descriptions_male = [
            '他站在落地窗前，指尖夹着将灭的烟，听到你进门的声音，转身时眼底的冰雪倏然融化。"回来了？嗯，我等你很久了。"',
            '"别看别人。"他的声音很轻，却带着不容拒绝的占有欲，修长的手指抬起你的下巴，"你的眼睛里，只能有我。"',
            '会议室里他是让所有人噤声的帝王，但回到家看见你做的黑暗料理，却二话不说吃完，然后轻声说"下次我来做"。',
            '他把黑卡甩到你面前："随便刷，花光了告诉我，我再赚就是了。比起钱，你开心比较重要。"然后别过脸去，耳朵尖悄悄泛红。',
            '所有人都说他冷血无情，可只有你知道，每个深夜他都会蹑手蹑脚给你掖好被角，然后在你额头落下一个吻。',
            '"我这人没什么耐心。"他慵懒地靠在椅背上，"但要是你的话...我可以等一辈子。"',
            '他有三个手机，两家公司，一把枪和一柄刀，但他说这辈子最珍贵的东西，是你回消息时带的那个笑脸表情。'
        ];

        const descriptions_female = [
            '她从实验室出来时还戴着护目镜，看到你递过来的奶茶，冰山一样的表情瞬间裂开一条缝，小声说了句"谢谢"。',
            '"我可以独自拯救世界。"她踩着高跟鞋走过来，声音忽然变软，"但今天好累，你可以抱抱我吗？"',
            '她为你挡下那一枪时，眼睛亮得像星星："没事，不疼的。比起这个，你受伤的话...我才会真的疼。"',
            '全球发布会上她是气场全开的女王，但视频电话里对着你撅嘴："想你了，你什么时候回来？"',
            '她的代码比诗歌还美，她的论文能让教授落泪，但她偷偷藏在枕头底下的，是你在便利贴上画的丑丑小人。',
            '"我算了一下，喜欢你的概率是百分之百。"她推了推眼镜，脸红到脖子根。',
            '她的剑法无人能挡，她的琴声动人心魄，但每天早上叫她起床都要叫八遍——以及她起床气超大。'
        ];

        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function generate() {
            let gender = selectedGender;
            if (gender === 'random') gender = Math.random() > 0.5 ? 'male' : 'female';

            const isMale = gender === 'male';
            const name = pick(isMale ? maleNames : femaleNames);
            const title = pick(isMale ? maleTitles : femaleTitles);
            const family = pick(families);
            const height = pick(isMale ? heights_male : heights_female);
            const look = pick(isMale ? looks_male : looks_female);
            const personality = pick(personalities);
            const zodiac = pick(zodiacs);
            const desc = pick(isMale ? descriptions_male : descriptions_female);

            const resultDiv = document.getElementById('result');
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = `
                <div class="result-card">
                    <div class="lover-header">
                        <div class="lover-name">${isMale ? '👨' : '👩'} ${name}</div>
                        <div class="lover-title">${title}</div>
                    </div>
                    <div class="attr-grid">
                        <div class="attr-item">
                            <div class="attr-label">💰 家境</div>
                            <div class="attr-value">${family}</div>
                        </div>
                        <div class="attr-item">
                            <div class="attr-label">📏 身高</div>
                            <div class="attr-value">${height}</div>
                        </div>
                        <div class="attr-item">
                            <div class="attr-label">✨ 长相</div>
                            <div class="attr-value">${look}</div>
                        </div>
                        <div class="attr-item">
                            <div class="attr-label">💫 性格</div>
                            <div class="attr-value">${personality}</div>
                        </div>
                        <div class="attr-item">
                            <div class="attr-label">⭐ 星座</div>
                            <div class="attr-value">${zodiac}</div>
                        </div>
                        <div class="attr-item">
                            <div class="attr-label">🎯 概率</div>
                            <div class="attr-value">遇见Ta的概率：0.000${Math.floor(Math.random()*9)+1}%</div>
                        </div>
                    </div>
                    <div class="lover-desc">${desc}</div>
                    <div class="share-row">
                        <button class="btn-again" onclick="generate()">🔄 再来一个</button>
                        <button class="btn-share" onclick="shareLover('${name}', '${title}')">📤 分享给朋友</button>
                    </div>
                </div>
            `;
        }

        function shareLover(name, title) {
            const text = `我刚生成了我的命定恋人：${name}（${title}）💘 你的又是谁？快来试试！`;
            if (navigator.share) {
                navigator.share({ title: '你的命定恋人生成器', text: text, url: window.location.href });
            } else {
                navigator.clipboard.writeText(text + '\n' + window.location.href).then(() => {
                    event.target.textContent = '已复制! ✓';
                    setTimeout(() => { event.target.textContent = '📤 分享给朋友'; }, 2000);
                });
            }
        }
    </script>
</body>
</html>
